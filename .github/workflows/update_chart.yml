name: Update new account chart

on:
  push:
    paths:
      - "data.md"
      - "plot_new_accounts.py"
      - "requirements.txt"
      - ".github/workflows/update_chart.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-chart:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Chinese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate chart
        run: |
          python plot_new_accounts.py

      - name: Commit updated chart
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add figures/new_accounts.png figures/new_accounts.svg
          git commit -m "Auto update new account chart" || echo "No chart changes to commit"
          git push
